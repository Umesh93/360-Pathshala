spring.application.name=360-pathshala
server.port=${PORT:8080}
server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/pathshala;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${JWT_SECRET:change-this-secret-to-a-long-random-production-value-360-pathshala}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

logging.level.org.springframework.security=INFO
logging.level.com.pathshala=INFO
